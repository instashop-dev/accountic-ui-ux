# Accountic — Production Deploy
#
# Triggered on every push to main. Deploys two Cloudflare Workers:
#   1. accountic-ui-ux  — Astro site worker (wrangler.jsonc)
#   2. accountic-blog-pipeline — AI blog pipeline worker (wrangler.pipeline.jsonc)
#
# Required GitHub Actions secrets:
#   CLOUDFLARE_API_TOKEN  — Cloudflare API token with Workers:Edit permission.
#                           Create at: https://dash.cloudflare.com/profile/api-tokens
#                           Use the "Edit Cloudflare Workers" template, scoped to
#                           both workers and their account.

name: Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy Astro worker to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy pipeline worker to Cloudflare
        run: npx wrangler deploy --config wrangler.pipeline.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
