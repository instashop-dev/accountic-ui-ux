# Accountic — Production Deploy
#
# Triggered on every push to main. Builds the Astro site and deploys
# to Cloudflare Workers via wrangler.
#
# Required GitHub Actions secrets:
#   CLOUDFLARE_API_TOKEN  — Cloudflare API token with Workers:Edit permission.
#                           Create at: https://dash.cloudflare.com/profile/api-tokens
#                           Use the "Edit Cloudflare Workers" template, scoped to
#                           the accountic-ui-ux Worker and its account.

name: Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
